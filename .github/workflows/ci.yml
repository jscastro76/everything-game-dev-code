name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Run tests
        run: npm test

      - name: Validate manifests
        run: npm run validate:manifests

      - name: Validate hooks
        run: npm run validate:hooks

      - name: Validate structure
        run: npm run validate:structure

      - name: Validate references
        run: npm run validate:references

      - name: Validate structure artifacts
        run: npm run validate:structure-artifacts

      - name: Show structure artifact diff on failure
        if: failure()
        shell: bash
        run: |
          npm run sync:structure
          echo "Changed structure artifact files:"
          git diff -- STRUCTURE-TREE.txt docs/structure-overview.md || true

      - name: Lint Markdown
        run: npm run lint:markdown
