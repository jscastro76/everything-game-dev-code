<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris 2D Mutation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050510;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* Touch controls — hidden on desktop */
        #touch-controls {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 6px 10px;
            gap: 10px;
            justify-content: space-between;
        }
        #touch-left, #touch-right {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .touch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #12122a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            color: #e0e0ff;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            width: 52px;
            height: 52px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active, .touch-btn.active {
            background: #2a2a5a;
            border-color: #ff00ff;
            color: #ffffff;
        }
        .touch-btn.wide {
            width: 110px;
            font-size: 11px;
        }
        .touch-btn.drop {
            background: #1a0a2a;
            border-color: #a000f0;
        }
        .touch-btn.basket {
            background: #0a1a1a;
            border-color: #00f0f0;
            font-size: 11px;
        }

        @media (pointer: coarse), (max-width: 768px) {
            #touch-controls {
                display: flex;
            }
            body {
                justify-content: flex-start;
                padding-top: 5px;
            }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="touch-controls">
        <div id="touch-left">
            <div style="display:flex; gap:8px; justify-content:center;">
                <button class="touch-btn" data-action="MOVE_LEFT">&larr;</button>
                <button class="touch-btn" data-action="SOFT_DROP">&darr;</button>
                <button class="touch-btn" data-action="MOVE_RIGHT">&rarr;</button>
            </div>
            <button class="touch-btn wide drop" data-action="HARD_DROP">DROP</button>
        </div>
        <div id="touch-right">
            <div style="display:flex; gap:8px; justify-content:center;">
                <button class="touch-btn basket" data-action="BASKET_STORE">C</button>
                <button class="touch-btn basket" data-action="BASKET_SWAP">X</button>
                <button class="touch-btn" data-action="PAUSE">II</button>
            </div>
            <div style="display:flex; gap:8px; justify-content:center;">
                <button class="touch-btn" data-action="ROTATE_CCW">&#8634;</button>
                <button class="touch-btn" data-action="ROTATE_CW">&#8635;</button>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
